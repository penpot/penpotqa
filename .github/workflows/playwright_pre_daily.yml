name: Daily Penpot Regression Tests on PRE
on:
  schedule: ## run tests at 20:50 UTC (22:50 UTC+2) on every day-of-week from Monday through Friday
    - cron: '50 20 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  tests_chromium:
    defaults:
      run:
        shell: bash
    environment: PRE
    timeout-minutes: 400
    runs-on: ubuntu-24.04
    env:
      TZ: Europe/Madrid
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Playwright Environment
        uses: ./.github/actions/setup-playwright

      - name: Run Playwright tests
        id: run-tests
        env:
          QASE_API_TOKEN: ${{ secrets.QASE_API_TOKEN }}
          QASE_MODE: testops
          QASE_PROJECT_CODE: ${{ secrets.QASE_PROJECT_CODE }}
          BASE_URL: ${{ secrets.BASE_URL }}
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          SECOND_EMAIL: ${{ secrets.SECOND_EMAIL }}
          LOGIN_PWD: ${{ secrets.LOGIN_PWD }}
          SSO_LOGIN_EMAIL: ${{ secrets.SSO_LOGIN_EMAIL }}
          SSO_LOGIN_PWD: ${{ secrets.SSO_LOGIN_PWD }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          REFRESH_TOKEN: ${{ secrets.REFRESH_TOKEN }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          GMAIL_NAME: ${{ secrets.GMAIL_NAME }}
          GMAIL_DOMAIN: ${{ secrets.GMAIL_DOMAIN }}
          STRIPE_SK: ${{ secrets.STRIPE_SK }}
        run: npx playwright test --project=chrome 2>&1 | tee test-output.log

      - name: Add Qase run link to summary
        if: always()
        run: |
          QASE_LINK=$(grep -oP 'https://app\.qase\.io/run/[A-Z0-9]+/dashboard/\d+' test-output.log | head -1)
          if [ -n "$QASE_LINK" ]; then
            echo "## Qase Report" >> $GITHUB_STEP_SUMMARY
            echo "🔗 [View run in Qase]($QASE_LINK)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate and Upload Reports
        uses: ./.github/actions/upload-reports
        with:
          browser-name: 'Chrome'
          artifact-name: 'playwright-report-chromium'
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          testdino_api_key: ${{ secrets.TDPW_API_KEY }}
        if: always()

      - name: Update flaky-test history
        if: always()
        continue-on-error: true
        run: |
          if [ ! -f playwright-report/results.json ]; then
            echo "No results.json produced, skipping flaky history update"
            exit 0
          fi
          aws s3 cp s3://kaleidos-qa-reports/flaky-history.json /tmp/flaky-history.json \
            || echo '{"tests":{}}' > /tmp/flaky-history.json
          npx tsx scripts/github-dashboard/flaky-tally.ts \
            --results playwright-report/results.json \
            --history /tmp/flaky-history.json \
            --run-id "${{ github.run_id }}" \
            --date "$(date -u +%F)" \
            --out /tmp/flaky-history.json
          aws s3 cp /tmp/flaky-history.json s3://kaleidos-qa-reports/flaky-history.json

      - name: Record deployed app version
        if: always()
        continue-on-error: true
        env:
          BASE_URL: ${{ secrets.BASE_URL }}
        run: |
          # Penpot embeds its version directly in the page:
          #   globalThis.penpotVersion = "2.17.0-...";
          # (verified against penpot/penpot frontend/resources/templates/index.mustache)
          VERSION=$(curl -sL "$BASE_URL" | grep -oE 'penpotVersion = "[^"]+"' | head -1 | sed 's/penpotVersion = "//; s/"$//')
          VERSION=${VERSION:-unknown}
          echo "Deployed app version: $VERSION"
          echo "$VERSION" > app-version.txt
          aws s3 cp app-version.txt "s3://kaleidos-qa-reports/run-${{ github.run_id }}/app-version.txt"

      - name: Send Mattermost Notification
        uses: ./.github/actions/send-notification
        with:
          mattermost-webhook-url: ${{ secrets.MATTERMOST_WEBHOOK_DAILY_REPORT }}
          browser-name: 'Chrome'
        if: always()
        continue-on-error: true
