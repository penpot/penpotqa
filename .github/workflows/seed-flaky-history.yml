# .github/workflows/seed-flaky-history.yml
#
# One-off: publishes scripts/github-dashboard/flaky-history.seed.json (backfilled
# locally from the daily run results.json files still available on S3 at the time)
# to s3://kaleidos-qa-reports/flaky-history.json, so the "Test reliability" section
# of the GitHub QA dashboard has data to show before playwright_pre_daily.yml's
# "Update flaky-test history" step has had time to build its own history.
#
# Refuses to run if flaky-history.json already exists on S3, so it can't clobber
# real accumulated history — safe to leave in the repo (or delete after first use).
#
# Actions tab -> "Seed flaky-test history" -> Run workflow.

name: Seed flaky-test history

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  seed:
    runs-on: ubuntu-latest
    environment: PRE # grants access to the AWS secrets below
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Publish seed data (only if none exists yet)
        run: |
          if aws s3api head-object --bucket kaleidos-qa-reports --key flaky-history.json 2>/dev/null; then
            echo "flaky-history.json already exists on S3 — refusing to overwrite it."
            echo "Delete it manually first if you really want to reseed, or just delete this workflow."
            exit 1
          fi
          aws s3 cp scripts/github-dashboard/flaky-history.seed.json \
            s3://kaleidos-qa-reports/flaky-history.json
          echo "✅ Seeded: https://kaleidos-qa-reports.s3.eu-west-1.amazonaws.com/flaky-history.json"
