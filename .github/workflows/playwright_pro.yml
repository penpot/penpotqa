name: Penpot Regression Tests on PRO env
on:
  workflow_dispatch:
jobs:
  tests_chromium:
    environment: PRO
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run regression tests for chromium
        env:
          BASE_URL: "https://design.penpot.app/"
          LOGIN_EMAIL: "cstanislav@qawerk.com"
          LOGIN_PWD: "23QwertyStas"
        run: npx playwright test --project=chrome -gv 'PERF' ./tests/panels-features/panels-features-fill.spec.js
      - name: Upload Playwright Report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report-chromium
          path: playwright-report/
          retention-days: 30
