services:
  playwright:
    image: mcr.microsoft.com/playwright:${PLAYWRIGHT_DOCKER_TAG:-v1.61.1-noble}
    platform: ${DOCKER_PLATFORM:-linux/amd64}
    working_dir: /work
    volumes:
      - .:/work
      - pw-node-modules:/work/node_modules
      - pw-browsers:/pw-browsers
    environment:
      PLAYWRIGHT_BROWSERS_PATH: /pw-browsers
    command: >
      bash -c "npm ci &&
      npx playwright install --with-deps chrome &&
      npx playwright test --project=chrome ${PW_ARGS:-}"

  playwright-ui:
    extends:
      service: playwright
    ports:
      - '8080:8080'
    command: >
      bash -c "npm ci &&
      npx playwright install --with-deps chrome &&
      npx playwright test --project=chrome --ui --ui-host=0.0.0.0 --ui-port=8080"

volumes:
  pw-browsers:
  pw-node-modules:
